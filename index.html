<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四川干瞪眼联机百搭版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #1a1a2e;
            background-image: radial-gradient(circle at center, #232342 0%, #11111d 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* 卡牌基础样式 */
        .card {
            width: 70px;
            height: 100px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4), inset 0 0 2px rgba(255,255,255,0.8);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            user-select: none;
            cursor: pointer;
            margin-left: -35px; /* 针形重叠的基础 */
            pointer-events: auto; /* 关键修复：确保容器响应点击 */
        }
        
        .card:first-child {
            margin-left: 0;
        }

        @media (max-width: 640px) {
            .card {
                width: 55px;
                height: 80px;
                padding: 4px;
                margin-left: -28px;
            }
            .card-value { font-size: 1.2rem !important; }
            .card-suit { font-size: 1.2rem !important; }
        }

        .card.hidden-card {
            background: repeating-linear-gradient(
                45deg,
                #1e3a8a,
                #1e3a8a 10px,
                #172554 10px,
                #172554 20px
            );
            border: 2px solid #60a5fa;
            cursor: default;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            pointer-events: none; /* 内部元素不阻挡点击 */
        }
        
        .card.hidden-card .card-content { display: none; }

        .card.red { color: #dc2626; }
        .card.black { color: #111827; }

        .card.selected {
            transform: translateY(-20px);
            box-shadow: 0 10px 15px -3px rgba(250, 204, 21, 0.5), 0 4px 6px -2px rgba(250, 204, 21, 0.3);
            border: 2px solid #facc15;
            z-index: 50 !important;
        }

        .card:hover:not(.hidden-card):not(.selected) {
            transform: translateY(-10px);
        }

        .card-value {
            font-size: 1.4rem;
            font-weight: 900;
            line-height: 1;
        }
        
        .card-value-bottom {
            font-size: 1.4rem;
            font-weight: 900;
            line-height: 1;
            transform: rotate(180deg);
        }

        .card-suit {
            font-size: 1.5rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.2; /* 水印效果 */
        }
        
        .small-suit {
            font-size: 1rem;
            margin-top: -2px;
        }

        /* 动画 */
        .deal-animation {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn {
            background: linear-gradient(to bottom, #eab308, #ca8a04);
            border: 2px solid #fef08a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.4);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        .btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.4);
        }
        .btn:disabled {
            background: linear-gradient(to bottom, #4b5563, #374151);
            border-color: #6b7280;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            text-shadow: none;
        }

        .btn-pass {
            background: linear-gradient(to bottom, #ef4444, #b91c1c);
            border-color: #fca5a5;
        }

        /* 模态框 */
        #messageBox, #lobbyModal {
            background-color: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(8px);
        }
        
        .hand-container {
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            max-width: 100%;
        }
    </style>
</head>

        async function initAuth() {

        function createDeck() {

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));

        function createCardElement(card, hidden = false, selectable = false) {

            if (card.suit === 'JOKER') {

            } else {

                    if (!myTurn || isGameOver) return;
                    cardDiv.classList.toggle('selected');

        function sortHand(hand) {
            hand.sort((a, b) => a.rank - b.rank);
        }

        // --- 核心规则评估器 ---
        
        // 评估普通卡牌(不含王)的合法组合
        function evaluateBaseCombo(cards) {
            let sorted = [...cards].sort((a, b) => a.rank - b.rank);
            let len = sorted.length;

            if (len === 1) return { type: 'single', rank: sorted[0].rank, length: 1 };
            
            if (len === 2) {
                if (sorted[0].rank === sorted[1].rank) return { type: 'pair', rank: sorted[0].rank, length: 2 };
                return null;
            }
            
            // 炸弹 (3-6张)
            let isBomb = true;
            for(let i=1; i<len; i++) {
                if (sorted[i].rank !== sorted[0].rank) { isBomb = false; break; }
            }
            if (isBomb) return { type: `bomb${len}`, rank: sorted[0].rank, length: len };

            // 顺子 (最少3张，且不能含2)
            if (len >= 3) {
                let isStraight = true;
                for (let i = 1; i < len; i++) {
                    if (sorted[i].rank !== sorted[i-1].rank + 1) {
                        isStraight = false; break;
                    }
                }
                if (isStraight && sorted[len-1].rank < 15) {
                    return { type: 'straight', rank: sorted[len-1].rank, length: len };
                }
            }

            // 连对 (最少2对即4张，且要是偶数张，且不能含2)
            if (len >= 4 && len % 2 === 0) {
                let isConnectedPairs = true;
                for(let i=0; i<len; i+=2) {
                    if (sorted[i].rank !== sorted[i+1].rank) { isConnectedPairs = false; break; }
                    if (i > 0 && sorted[i].rank !== sorted[i-1].rank + 1) { isConnectedPairs = false; break; }
                }
                if (isConnectedPairs && sorted[len-1].rank < 15) {
                    return { type: 'pairs', rank: sorted[len-1].rank, length: len };
                }
            }

            return null;
        }

        // 评估包含王牌的组合 (百搭替换)
        function getValidCombos(cards) {
            if (!cards || cards.length === 0) return [];
            
            let jokers = cards.filter(c => c.suit === 'JOKER');
            let normals = cards.filter(c => c.suit !== 'JOKER');

            // 规则：大小王不能单出，也不能单独组合出，必须搭普通牌
            if (normals.length === 0) return []; 
            if (jokers.length === 0) {
                let base = evaluateBaseCombo(cards);
                return base ? [base] : [];
            }

            let results = [];
            // 使用递归回溯来测试王牌可以变成的各种普通牌
            function backtrack(index, currentNormals) {
                if (index === jokers.length) {
                    let res = evaluateBaseCombo(currentNormals);
                    if (res && !results.some(r => r.type === res.type && r.rank === res.rank)) {
                        results.push(res);
                    }
                    return;
                }
                // 王牌可以变成3到A的任意牌 (不能变2)
                for (let r = 3; r <= 14; r++) {
                    currentNormals.push({ rank: r, suit: 'FAKE_SUIT' });
                    backtrack(index + 1, currentNormals);
                    currentNormals.pop();
                }
                // 特殊：如果只是配炸弹或对子，王牌也可以变2
                currentNormals.push({ rank: 15, suit: 'FAKE_SUIT' });
                backtrack(index + 1, currentNormals);
                currentNormals.pop();
            }

            backtrack(0, [...normals]);
            return results;
        }

        function evaluateCombo(cards) {
            let possibleCombos = getValidCombos(cards);
            if (possibleCombos.length === 0) return null;
            
            // 如果有多种可能，选择最优的一种
            // 优先选择能压住当前桌面的
            if (tableType) {
                let valid = possibleCombos.find(c => canPlay(c, tableType, tableRank, tableLength));
                if (valid) return valid;
            }
            
            // 否则返回其中一种 (通常按照rank倒序，选最大的)
            possibleCombos.sort((a,b) => b.rank - a.rank);
            return possibleCombos[0];
        }

        function canPlay(selectedCombo, currentTableType, currentTableRank, currentTableLength) {
            if (!selectedCombo) return false;

            // 1. 如果桌面为空，任何合法牌型都可以出
            if (!currentTableType) return true;

            // 2. 贴牌规则 (Tie)：如果桌面是单牌，打出一对相同的牌可以直接贴死
            if (currentTableType === 'single' && selectedCombo.type === 'pair') {
                return selectedCombo.rank === currentTableRank;
            }

            // 3. 炸弹逻辑比较
            let isCurrentBomb = currentTableType && currentTableType.startsWith('bomb');
            let isSelectedBomb = selectedCombo.type.startsWith('bomb');

            if (isSelectedBomb) {
                if (!isCurrentBomb) return true; // 炸弹压普通牌
                
                // 炸弹对轰：先比张数，再比点数
                let sLen = parseInt(selectedCombo.type.replace('bomb', ''));
                let cLen = parseInt(currentTableType.replace('bomb', ''));
                
                if (sLen > cLen) return true;
                if (sLen === cLen) return selectedCombo.rank > currentTableRank;
                return false;
            }
            if (isCurrentBomb) return false; // 普通牌打不过炸弹

            // 4. 非炸弹必须牌型且数量一致
            if (selectedCombo.type !== currentTableType || selectedCombo.length !== currentTableLength) {
                return false;
            }

            // 5. 干瞪眼核心规则：只能大1点，或者用2压
            if (selectedCombo.type === 'single' || selectedCombo.type === 'pair') {
                if (selectedCombo.rank === 15 && currentTableRank < 15) return true; // 2压
                return selectedCombo.rank === currentTableRank + 1; // 大1点
            }

            if (selectedCombo.type === 'straight' || selectedCombo.type === 'pairs') {
                return selectedCombo.rank === currentTableRank + 1; // 顺子/连对 大1点
            }

            return false;
        }

        function checkPlayButton() {
            const selectedEls = document.querySelectorAll('#player-cards .card.selected');
            const selectedIds = Array.from(selectedEls).map(el => el.dataset.id);
            const selectedCards = playerHand.filter(c => selectedIds.includes(c.id));
            
            const combo = evaluateCombo(selectedCards);
            const myTurn = (gameMode === 'ai' && currentPlayerRole === 'player1') || 
                           (gameMode === 'online' && currentPlayerRole === myRole);
            
            if (myTurn && combo && canPlay(combo, tableType, tableRank, tableLength)) {
                elBtnPlay.disabled = false;
            } else {
                elBtnPlay.disabled = true;
            }
        }

        // --- 单机模式 ---
        
        function initAiGame() {
            gameMode = 'ai';
            myRole = 'player1';
            isGameOver = false;
            msgBox.classList.add('hidden');
            
            elRoomIndicator.textContent = "单机对战模式";

            aiHand = [];
            tableCards = [];

            tableLength = 0;

            // 规则更新：双方各5张牌起手
            for(let i=0; i<5; i++) playerHand.push(deck.pop());

        function updateAiUIState() {
            if (isGameOver) return;
            if (currentPlayerRole === 'player1') {
                elPlayerStatus.textContent = "该你出牌";
                elPlayerStatus.className = "text-xs text-green-400 ml-2 font-bold animate-pulse";
                elOpponentStatus.textContent = "等待中";
                elOpponentStatus.className = "text-xs text-gray-500";
                
                checkPlayButton();
                elBtnPass.disabled = !(tableCards.length > 0 && tableOwner === 'player2');
            } else {
                elPlayerStatus.textContent = "等待对手";
                elPlayerStatus.className = "text-xs text-gray-500 ml-2";
                elOpponentStatus.textContent = "出牌中...";
                elOpponentStatus.className = "text-xs text-yellow-400 font-bold fade-in";
                
                elBtnPlay.disabled = true;
                elBtnPass.disabled = true;
                
                setTimeout(aiTurn, 1000);
            }
        }

        // 简化版AI策略生成
        function getCombinations(array, k) {
            let result = [];
            function combine(start, currentCombo) {
                if (currentCombo.length === k) {
                    result.push([...currentCombo]);
                    return;
                }
                for (let i = start; i < array.length; i++) {
                    currentCombo.push(array[i]);
                    combine(i + 1, currentCombo);
                    currentCombo.pop();
                }
            }
            combine(0, []);
            return result;
        }

        function findBestAiPlay() {
            // 如果桌面为空，AI随便出一张非王的单牌或合法牌型
            if (!tableType) {
                for (let c of aiHand) {
                    if (c.suit !== 'JOKER') return [c];
                }
                // 极端情况：全是王，虽然不可能（最多2张王），但为了防错
                return null;
            }

            // 遍历AI手牌的所有可能子集组合，看哪个能打出且最划算
            let validPlays = [];
            for (let i = 1; i <= aiHand.length; i++) {
                let combos = getCombinations(aiHand, i);
                for (let combo of combos) {
                    let evals = getValidCombos(combo);
                    for (let ev of evals) {
                        if (canPlay(ev, tableType, tableRank, tableLength)) {
                            validPlays.push({ cards: combo, evaluation: ev });
                        }
                    }
                }
            }

            if (validPlays.length > 0) {
                // 找牌数和桌面一致的最优解(尽量不用炸弹，如果能压)
                let nonBombs = validPlays.filter(p => !p.evaluation.type.startsWith('bomb') && (!tableType.startsWith('bomb') || p.evaluation.type === 'pair')); // pair是为了允许贴牌
                if (nonBombs.length > 0) {
                    nonBombs.sort((a,b) => a.evaluation.rank - b.evaluation.rank);
                    return nonBombs[0].cards;
                }
                // 只能用炸弹
                let bombs = validPlays.filter(p => p.evaluation.type.startsWith('bomb'));
                if (bombs.length > 0) {
                    bombs.sort((a,b) => {
                        let aLen = parseInt(a.evaluation.type.replace('bomb',''));
                        let bLen = parseInt(b.evaluation.type.replace('bomb',''));
                        if (aLen !== bLen) return aLen - bLen;
                        return a.evaluation.rank - b.evaluation.rank;
                    });
                    return bombs[0].cards;
                }
            }

            return null;
        }

        function removeCardsFromHand(hand, cardsToRemove) {
            let idsToRemove = cardsToRemove.map(c => c.id);
            return hand.filter(c => !idsToRemove.includes(c.id));
        }

        function aiTurn() {
            if (isGameOver) return;

            const cardsToPlay = findBestAiPlay();

            if (cardsToPlay) {
                const combo = evaluateCombo(cardsToPlay);
                if (!combo) return;

                aiHand = removeCardsFromHand(aiHand, cardsToPlay);
                
                // 检查是否是贴牌
                let isTie = (tableType === 'single' && combo.type === 'pair' && combo.rank === tableRank);

                tableCards = cardsToPlay;
                tableType = combo.type;
                tableRank = combo.rank;
                tableLength = combo.length;
                tableOwner = 'player2';
                
                renderHands();
                renderTable(tableCards);
                
                if (checkWin()) return;
                
                if (isTie) {
                    showActionMsg("贴牌！", true);
                    endTrickPhaseAi(); // 贴牌直接结束回合
                } else {
                    currentPlayerRole = 'player1';
                    updateAiUIState();
                }
            } else {
                showActionMsg("要不起!", true);
                renderTable([], true); 
                endTrickPhaseAi();
            }
        }

        function endTrickPhaseAi() {
            setTimeout(() => {
                tableCards = [];
                tableType = null;
                tableRank = 0;
                tableLength = 0;
                renderTable([]);
                
                if (deck.length > 0) {
                    // 最大牌拥有者先摸牌
                    if (tableOwner === 'player1') {
                        playerHand.push(deck.pop());
                        if(deck.length > 0) aiHand.push(deck.pop());
                    } else {
                        aiHand.push(deck.pop());
                        if(deck.length > 0) playerHand.push(deck.pop());
                    }
                    showActionMsg("回合结束，各摸一张牌", false);
                }

                renderHands();
                if (checkWin()) return;

                currentPlayerRole = tableOwner;
                updateAiUIState();
            }, 800);
        }

        // --- 联机网络模式 ---
        
        async function createRoom() {
            if (!currentUser) return;
            const roomId = Math.floor(1000 + Math.random() * 9000).toString();
            currentRoomId = roomId;
            myRole = 'player1';

            let initialDeck = shuffle(createDeck());
            let p1Hand = [];
            let p2Hand = [];
            for(let i=0; i<5; i++) p1Hand.push(initialDeck.pop());
            for(let i=0; i<5; i++) p2Hand.push(initialDeck.pop());

            const roomData = {
                status: 'waiting',
                creatorUid: currentUser.uid,
                player1: { uid: currentUser.uid, name: `房主(${currentUser.uid.slice(0, 4)})`, hand: p1Hand },
                player2: null,
                deck: initialDeck,
                tableCards: [],
                tableType: null,
                tableRank: 0,
                tableLength: 0,
                tableOwner: null,
                currentPlayerRole: 'player1',
                actionMsg: '',
                actionMsgTarget: ''
            };

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            await setDoc(roomRef, roomData);

            elDisplayRoomId.textContent = roomId;
            elLobbyModal.classList.add('hidden');
            elWaitingModal.classList.remove('hidden');

            listenToRoom(roomId);
        }

        async function joinRoom() {
            if (!currentUser) return;
            const roomId = elInputRoomId.value.trim();
            if (roomId.length !== 4) return alert("请输入4位数字房间号！");

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            const snap = await getDoc(roomRef);

            if (!snap.exists()) return alert("房间不存在，请确认房间号！");
            const rData = snap.data();
            if (rData.status !== 'waiting') return alert("房间已经满员或已经开始游戏！");

            myRole = 'player2';
            currentRoomId = roomId;

            await updateDoc(roomRef, {
                player2: { uid: currentUser.uid, name: `好友(${currentUser.uid.slice(0, 4)})`, hand: rData.player2 ? rData.player2.hand : [] },
                status: 'playing'
            });

            elLobbyModal.classList.add('hidden');
            listenToRoom(roomId);
        }

        function listenToRoom(roomId) {
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            
            unsubscribeRoom = onSnapshot(roomRef, (snapshot) => {
                if (!snapshot.exists()) {
                    if (!isGameOver) { alert("房间已被解散！"); exitToLobby(); }
                    return;
                }
                const data = snapshot.data();
                handleRoomUpdate(data);
            }, (error) => {
                console.error("Firestore listen error:", error);
            });
        }

        function handleRoomUpdate(data) {
            if (data.status === 'waiting') return; 

            if (data.status === 'playing') {
                elWaitingModal.classList.add('hidden');
                elMenuScreen.classList.add('hidden');
                elGameStage.classList.remove('hidden');
                gameMode = 'online';
                isGameOver = false;

                elRoomIndicator.textContent = `联机房间: ${currentRoomId}`;

                const me = myRole === 'player1' ? data.player1 : data.player2;
                const opp = myRole === 'player1' ? data.player2 : data.player1;

                playerHand = me.hand || [];
                opponentHandLength = opp ? (opp.hand ? opp.hand.length : 0) : 0;
                deck = data.deck || [];
                
                tableCards = data.tableCards || [];
                tableType = data.tableType;
                tableRank = data.tableRank;
                tableLength = data.tableLength;
                tableOwner = data.tableOwner;
                currentPlayerRole = data.currentPlayerRole;

                elOpponentName.textContent = opp ? opp.name : "未知好友";
                elOpponentIcon.textContent = "👤";
                elMyNameLabel.textContent = `我的手牌 (${me.name})`;

                renderHands();
                renderTable(tableCards);

                if (data.actionMsg) {
                    const isOpp = data.actionMsgTarget !== myRole;
                    showActionMsg(data.actionMsg, isOpp);
                }

                updateOnlineUIState();
                checkOnlineWinner();
            }
        }

        function updateOnlineUIState() {
            if (currentPlayerRole === myRole) {
                elPlayerStatus.textContent = "该你出牌";
                elPlayerStatus.className = "text-xs text-green-400 ml-2 font-bold animate-pulse";
                elOpponentStatus.textContent = "等待中";
                elOpponentStatus.className = "text-xs text-gray-500";
                
                checkPlayButton();
                elBtnPass.disabled = !(tableCards.length > 0 && tableOwner !== myRole);
            } else {
                elPlayerStatus.textContent = "等待对手";
                elPlayerStatus.className = "text-xs text-gray-500 ml-2";
                elOpponentStatus.textContent = "出牌中...";
                elOpponentStatus.className = "text-xs text-yellow-400 font-bold fade-in animate-pulse";
                
                elBtnPlay.disabled = true;
                elBtnPass.disabled = true;
            }
        }

        async function playCardsOnline() {
            if (currentPlayerRole !== myRole || isGameOver) return;

            const selectedEls = document.querySelectorAll('#player-cards .card.selected');
            const selectedIds = Array.from(selectedEls).map(el => el.dataset.id);
            const selectedCards = playerHand.filter(c => selectedIds.includes(c.id));
            
            const combo = evaluateCombo(selectedCards);
            if (!combo) return;

            let isTie = (tableType === 'single' && combo.type === 'pair' && combo.rank === tableRank);

            const nextHand = removeCardsFromHand(playerHand, selectedCards);
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            
            if (isTie) {
                // 贴牌处理：直接结算本回合
                const snap = await getDoc(roomRef);
                const rData = snap.data();
                let p1H = myRole === 'player1' ? nextHand : (rData.player1.hand || []);
                let p2H = myRole === 'player2' ? nextHand : (rData.player2.hand || []);
                let nDeck = rData.deck || [];

                if (nDeck.length > 0) {
                    if (myRole === 'player1') {
                        p1H.push(nDeck.pop());
                        if (nDeck.length > 0) p2H.push(nDeck.pop());
                    } else {
                        p2H.push(nDeck.pop());
                        if (nDeck.length > 0) p1H.push(nDeck.pop());
                    }
                }

                await updateDoc(roomRef, {
                    tableCards: [],
                    tableType: null,
                    tableRank: 0,
                    tableLength: 0,
                    tableOwner: null,
                    deck: nDeck,
                    'player1.hand': p1H,
                    'player2.hand': p2H,
                    currentPlayerRole: myRole, // 贴牌者继续发牌
                    actionMsg: '贴牌！',
                    actionMsgTarget: myRole
                });

            } else {
                // 正常出牌
                const updates = {
                    tableCards: selectedCards,
                    tableType: combo.type,
                    tableRank: combo.rank,
                    tableLength: combo.length,
                    tableOwner: myRole,
                    currentPlayerRole: myRole === 'player1' ? 'player2' : 'player1',
                    actionMsg: '',
                    actionMsgTarget: ''
                };
                updates[`${myRole}.hand`] = nextHand;
                await updateDoc(roomRef, updates);
            }
        }

        async function passOnline() {
            if (currentPlayerRole !== myRole || isGameOver) return;

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            const snap = await getDoc(roomRef);
            if (!snap.exists()) return;
            const rData = snap.data();

            let p1Hand = rData.player1.hand || [];
            let p2Hand = rData.player2.hand || [];
            let nextDeck = rData.deck || [];

            if (nextDeck.length > 0) {
                if (rData.tableOwner === 'player1') {
                    p1Hand.push(nextDeck.pop());
                    if (nextDeck.length > 0) p2Hand.push(nextDeck.pop());
                } else {
                    p2Hand.push(nextDeck.pop());
                    if (nextDeck.length > 0) p1Hand.push(nextDeck.pop());
                }
            }

            await updateDoc(roomRef, {
                tableCards: [],
                tableType: null,
                tableRank: 0,
                tableLength: 0,
                tableOwner: null,
                deck: nextDeck,
                'player1.hand': p1Hand,
                'player2.hand': p2Hand,
                currentPlayerRole: rData.tableOwner, 
                actionMsg: '要不起',
                actionMsgTarget: myRole
            });
        }

        function checkOnlineWinner() {
            if (gameMode !== 'online') return;
            if (playerHand.length === 0 && opponentHandLength > 0) {
                endGame("胜利！", "恭喜你，你的手牌已全部出完！", true);
            } else if (opponentHandLength === 0 && playerHand.length > 0) {
                endGame("你输了", "真可惜，对手的手牌已经出完了！", false);
            }
        }

        // --- 交互事件 ---

        elBtnPlay.addEventListener('click', () => {
            if (gameMode === 'ai') {
                const selectedEls = document.querySelectorAll('#player-cards .card.selected');
                const selectedIds = Array.from(selectedEls).map(el => el.dataset.id);
                const selectedCards = playerHand.filter(c => selectedIds.includes(c.id));
                const combo = evaluateCombo(selectedCards);
                if(!combo) return;
                
                let isTie = (tableType === 'single' && combo.type === 'pair' && combo.rank === tableRank);

                playerHand = removeCardsFromHand(playerHand, selectedCards);
                tableCards = selectedCards;
                tableType = combo.type;
                tableRank = combo.rank;
                tableLength = combo.length;
                tableOwner = 'player1';
                
                renderHands();
                renderTable(tableCards);
                
                if (checkWin()) return;
                
                if (isTie) {
                    showActionMsg("贴牌！", true);
                    endTrickPhaseAi();
                } else {
                    currentPlayerRole = 'player2';
                    updateAiUIState();
                }
            } else {
                playCardsOnline();
            }
        });

        elBtnPass.addEventListener('click', () => {
            if (gameMode === 'ai') {
                showActionMsg("要不起", false);
                endTrickPhaseAi();
            } else {
                passOnline();
            }
        });

        function checkWin() {
            if (playerHand.length === 0) {
                endGame("你赢了！", "恭喜你，你的手牌已全部出完！", true);
                return true;
            } else if (aiHand.length === 0) {
                endGame("AI 获胜", "被 AI 干瞪眼了，加油再来！", false);
                return true;
            }
            return false;
        }

        function endGame(title, content, isWin) {
            isGameOver = true;
            msgTitle.textContent = title;
            msgTitle.className = isWin ? "text-3xl font-black text-yellow-400 mb-2" : "text-3xl font-black text-gray-400 mb-2";
            msgIcon.textContent = isWin ? "🏆" : "🥀";
            msgContent.textContent = content;
            
            msgBox.classList.remove('hidden');
            setTimeout(() => {
                msgBox.firstElementChild.classList.remove('scale-95');
                msgBox.firstElementChild.classList.add('scale-100');
            }, 10);
        }

        msgBtnRestart.addEventListener('click', async () => {
            msgBox.firstElementChild.classList.remove('scale-100');
            msgBox.firstElementChild.classList.add('scale-95');
            setTimeout(async () => {
                if (gameMode === 'ai') {
                    initAiGame();
                } else {
                    if (myRole === 'player1') {
                        let initialDeck = shuffle(createDeck());
                        let p1Hand = [];
                        let p2Hand = [];
                        for(let i=0; i<5; i++) p1Hand.push(initialDeck.pop());
                        for(let i=0; i<5; i++) p2Hand.push(initialDeck.pop());

                        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                        await updateDoc(roomRef, {
                            'player1.hand': p1Hand,
                            'player2.hand': p2Hand,
                            deck: initialDeck,
                            tableCards: [],
                            tableType: null,
                            tableRank: 0,
                            tableLength: 0,
                            tableOwner: null,
                            currentPlayerRole: 'player1',
                            actionMsg: '新的一局开始了！',
                            actionMsgTarget: 'all'
                        });
                        msgBox.classList.add('hidden');
                    } else {
                        alert("请等待房主点击“再来一局”开新战局！");
                    }
                }
            }, 200);
        });

        msgBtnExit.addEventListener('click', exitToLobby);

        async function exitToLobby() {
            if (unsubscribeRoom) {
                unsubscribeRoom();
                unsubscribeRoom = null;
            }
            if (currentRoomId && gameMode === 'online') {
                if (myRole === 'player1') {
                    try {
                        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                        await deleteDoc(roomRef);
                    } catch (e) {}
                }
            }
            currentRoomId = null;
            isGameOver = false;
            msgBox.classList.add('hidden');
            elGameStage.classList.add('hidden');
            elMenuScreen.classList.remove('hidden');
        }

        elBtnVsAi.addEventListener('click', initAiGame);
        elBtnOnline.addEventListener('click', () => elLobbyModal.classList.remove('hidden'));
        elBtnBackMenu.addEventListener('click', () => elLobbyModal.classList.add('hidden'));
        elBtnCreateRoom.addEventListener('click', createRoom);
        elBtnJoinRoom.addEventListener('click', joinRoom);

        elBtnCancelRoom.addEventListener('click', async () => {
            if (currentRoomId) {
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                    await deleteDoc(roomRef);
                } catch(e) {}
            }
            if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
            currentRoomId = null;
            elWaitingModal.classList.add('hidden');
            elLobbyModal.classList.remove('hidden');
        });

        window.onload = () => initAuth();

    </script>
</body>
</html>
