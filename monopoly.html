<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国之旅 · 豪华版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#f0c060;--gold2:#d4801a;--gold-glow:rgba(240,180,60,.4);}
body{min-height:100vh;background:radial-gradient(ellipse at 30% 20%,#2a0a00,#0d0500 60%),radial-gradient(ellipse at 70% 80%,#1a0600,#050200 60%);background-attachment:fixed;font-family:'Noto Serif SC','Microsoft YaHei',serif;color:#fff;user-select:none;display:flex;flex-direction:column;align-items:center;padding:12px;gap:10px;overflow-x:auto;}
#topbar{display:flex;align-items:center;gap:14px;background:rgba(240,180,60,.06);border:1px solid rgba(240,180,60,.2);border-radius:14px;padding:8px 20px;width:100%;max-width:1280px;}
#topbar h1{font-size:1.3rem;color:var(--gold);text-shadow:0 0 30px var(--gold-glow);letter-spacing:7px;flex:1;}
.info-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 11px;font-size:11px;color:#a0b0c0;}
.info-pill span{color:var(--gold);font-weight:700;font-size:13px;}
.info-pill.alert{border-color:rgba(255,160,0,.4);color:#ff9f40;}
/* s-menu默认可见，其余隐藏 */
.screen{display:none;flex-direction:column;align-items:center;gap:20px;padding:28px 36px;background:rgba(240,180,60,.05);border:1px solid rgba(240,180,60,.3);border-radius:20px;max-width:560px;width:100%;}
.s-title{font-size:1.05rem;color:var(--gold);letter-spacing:4px;text-align:center;}
.s-sub{font-size:11px;color:#607080;letter-spacing:1px;text-align:center;margin-top:3px;}
.divider{width:100%;border-top:1px solid rgba(240,180,60,.15);}
.big-btn{width:100%;padding:14px 0;font-size:14px;font-weight:700;font-family:inherit;letter-spacing:3px;border:none;border-radius:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:center;justify-content:center;gap:10px;}
.big-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0a00;box-shadow:0 4px 20px rgba(212,128,26,.4);}
.big-btn.ghost{background:rgba(255,255,255,.07);color:#c0c8d0;border:1px solid rgba(255,255,255,.15);}
.big-btn:hover{transform:translateY(-2px) scale(1.02);}
.big-btn:active{transform:scale(.97);}
.opt-row{display:flex;align-items:center;gap:12px;width:100%;}
.opt-label{font-size:12px;color:#7090a0;letter-spacing:2px;min-width:72px;}
.tog-grp{display:flex;gap:8px;flex-wrap:wrap;}
.tog{padding:6px 13px;font-size:11px;font-family:inherit;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#a0b0c0;cursor:pointer;transition:all .2s;}
.tog.on{background:rgba(240,180,60,.2);border-color:var(--gold);color:var(--gold);}
.pnum-btns{display:flex;gap:12px;}
.pnum-btn{width:58px;height:58px;border-radius:50%;border:2px solid rgba(240,180,60,.35);background:rgba(240,180,60,.06);color:var(--gold);font-size:1.4rem;font-weight:900;font-family:inherit;cursor:pointer;transition:all .2s;}
.pnum-btn:hover{background:rgba(240,180,60,.2);border-color:var(--gold);transform:scale(1.08);}
.pnum-btn.sel{background:var(--gold);color:#1a0a00;border-color:var(--gold);box-shadow:0 0 20px var(--gold-glow);}
.room-input{width:100%;padding:12px 16px;font-size:22px;font-weight:700;letter-spacing:12px;text-align:center;background:rgba(255,255,255,.07);border:1px solid rgba(240,180,60,.3);border-radius:12px;color:var(--gold);font-family:inherit;outline:none;}
.room-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-glow);}
.room-code-big{font-size:38px;font-weight:900;letter-spacing:16px;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);padding:10px 0;}
.wait-dots{display:flex;gap:8px;margin-top:2px;}
.wdot{width:8px;height:8px;border-radius:50%;background:var(--gold);opacity:.3;animation:dotB 1.2s infinite;}
.wdot:nth-child(2){animation-delay:.2s;}.wdot:nth-child(3){animation-delay:.4s;}
@keyframes dotB{0%,100%{opacity:.3}50%{opacity:1}}
.pslot{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,.05);border-radius:10px;width:100%;}
.slot-z{font-size:22px;}.slot-n{font-size:13px;flex:1;}
.slot-b{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(240,180,60,.2);color:var(--gold);}
.slot-b.w{background:rgba(255,255,255,.07);color:#607080;animation:dotB 1.5s infinite;}
/* 生肖 */
.zodiac-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.z-opt{width:64px;height:68px;border-radius:11px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .2s;position:relative;}
.z-opt:hover{background:rgba(240,180,60,.15);border-color:rgba(240,180,60,.5);transform:scale(1.06);}
.z-opt.taken{opacity:.2;pointer-events:none;}
.z-opt.sel{background:rgba(240,180,60,.2);border-color:var(--gold);box-shadow:0 0 14px var(--gold-glow);}
.z-em{font-size:24px;line-height:1;}.z-nm{font-size:9px;color:#a0b0c0;}
.z-ck{position:absolute;top:2px;right:3px;font-size:11px;display:none;}
.z-opt.sel .z-ck{display:block;}
/* 游戏 */
#game-screen{display:none;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:1280px;}
.game-body{display:flex;gap:12px;align-items:flex-start;width:100%;}
#board{display:grid;gap:2px;padding:6px;background:#100400;border:2px solid var(--gold);border-radius:14px;box-shadow:0 0 60px rgba(240,180,60,.15),inset 0 0 40px rgba(0,0,0,.6);position:relative;flex-shrink:0;}
#board-center{background:radial-gradient(ellipse,#2a1000,#100500);border:1px solid rgba(240,180,60,.25);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.center-map{font-size:36px;filter:drop-shadow(0 0 10px var(--gold-glow));}.center-title{font-size:14px;font-weight:900;color:var(--gold);letter-spacing:5px;}.center-sub{font-size:8px;color:rgba(240,180,60,.4);letter-spacing:2px;}
.cell{border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:1px;padding:2px 2px 3px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.1);background:#200900;transition:border-color .2s,box-shadow .2s;}
.cell.city{border-color:rgba(240,180,60,.15);}
.cell.active-cell{border-color:var(--gold)!important;box-shadow:0 0 14px var(--gold-glow)!important;}
.cell-bg{position:absolute;inset:0;font-size:26px;display:flex;align-items:center;justify-content:center;opacity:.14;pointer-events:none;}
.cell-stripe{position:absolute;top:0;left:0;right:0;height:4px;border-radius:4px 4px 0 0;}
.cell-num{font-size:7px;color:rgba(255,255,255,.35);font-weight:700;line-height:1;position:relative;z-index:2;}
.cell-icon{font-size:13px;line-height:1;position:relative;z-index:2;}
.cell-name{font-size:8px;color:#fff;white-space:nowrap;line-height:1;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.9);position:relative;z-index:2;}
.cell-price{font-size:7px;color:rgba(240,180,60,.8);line-height:1;position:relative;z-index:2;}
.cell-owner{position:absolute;top:2px;right:2px;font-size:11px;z-index:3;}
.cell-buildings{position:absolute;top:2px;left:2px;font-size:7px;z-index:3;letter-spacing:-2px;}
.token{position:absolute;width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 10px rgba(0,0,0,.7);pointer-events:none;z-index:30;transition:left .35s cubic-bezier(.25,.8,.25,1),top .35s cubic-bezier(.25,.8,.25,1);display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;}
#dice-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:150;}
#dice-overlay.show{display:flex;}
.dice-stage{display:flex;flex-direction:column;align-items:center;gap:16px;}
.dice-box{width:100px;height:100px;border-radius:18px;background:linear-gradient(135deg,#fff5e0,#ffe0a0);border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:64px;line-height:1;box-shadow:0 0 40px rgba(240,180,60,.5),0 8px 30px rgba(0,0,0,.6);}
.dice-box.rolling{animation:diceRoll .08s linear infinite;}
@keyframes diceRoll{0%{transform:rotate(0)scale(1)}25%{transform:rotate(-12deg)scale(1.05)}50%{transform:rotate(0)scale(.95)}75%{transform:rotate(12deg)scale(1.05)}100%{transform:rotate(0)scale(1)}}
.dice-box.land{animation:diceLand .4s cubic-bezier(.3,1.6,.4,1);}
@keyframes diceLand{0%{transform:scale(1.3)rotate(-8deg)}60%{transform:scale(.9)rotate(3deg)}100%{transform:scale(1)rotate(0)}}
.dice-result{font-size:18px;color:var(--gold);letter-spacing:4px;font-weight:700;min-height:28px;}
.dice-bonus{font-size:13px;color:#ff9f40;letter-spacing:2px;}
#right-panel{flex:1;min-width:210px;max-width:300px;display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 160px);overflow-y:auto;}
.player-card{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:9px 11px;transition:border-color .3s,box-shadow .3s;}
.player-card.active-player{border-color:var(--pc);box-shadow:0 0 14px var(--pg);}
.player-card.bankrupt{opacity:.3;}
.pc-header{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.pc-zodiac{font-size:18px;line-height:1;flex-shrink:0;}
.pc-name{font-size:11px;font-weight:700;flex:1;}
.pc-badge-ai{font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(46,204,113,.15);color:#2ecc71;}
.pc-badge-you{font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(240,180,60,.2);color:var(--gold);}
.pc-arrow{font-size:11px;color:var(--gold);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.pc-money{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:2px;}
.pc-money.low{color:#ff6b6b;}
.pc-net{font-size:9px;color:#506070;margin-bottom:3px;}
.pc-status{font-size:9px;color:#ff6b6b;font-weight:700;margin-top:1px;}
.prop-table{width:100%;border-collapse:collapse;margin-top:4px;}
.prop-table th{font-size:8px;color:#506070;padding:2px 3px;text-align:left;border-bottom:1px solid rgba(255,255,255,.07);}
.prop-table td{font-size:8px;color:#c0c8d0;padding:2px 3px;border-bottom:1px solid rgba(255,255,255,.04);}
.grp-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:2px;vertical-align:middle;}
#event-log{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(240,180,60,.12);border-radius:10px;padding:6px 12px;height:62px;overflow-y:auto;}
.log-entry{font-size:11px;color:#809090;line-height:1.65;}
.log-entry.latest{color:var(--gold);}
#controls{display:flex;align-items:center;gap:10px;width:100%;flex-wrap:wrap;justify-content:center;}
#rollBtn{padding:10px 36px;font-size:14px;font-weight:700;font-family:inherit;letter-spacing:4px;color:#1a0a00;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 18px rgba(212,128,26,.45);transition:transform .15s,box-shadow .15s,opacity .2s;}
#rollBtn:hover:not(:disabled){transform:translateY(-2px)scale(1.03);box-shadow:0 8px 24px rgba(212,128,26,.65);}
#rollBtn:active:not(:disabled){transform:scale(.97);}
#rollBtn:disabled{opacity:.35;cursor:not-allowed;}
.info-card{min-width:76px;padding:5px 11px;text-align:center;background:rgba(240,180,60,.06);border:1px solid rgba(240,180,60,.18);border-radius:10px;}
.info-label{font-size:8px;color:#607080;margin-bottom:2px;letter-spacing:1px;}
.info-value{font-size:14px;font-weight:700;color:var(--gold);}
#waiting-banner{display:none;background:rgba(52,152,219,.1);border:1px solid rgba(52,152,219,.3);border-radius:10px;padding:8px 16px;text-align:center;font-size:12px;color:#7ab8d8;width:100%;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:200;}
#overlay.show{display:flex;}
.modal{background:linear-gradient(160deg,#2a0e00,#150700);border:2px solid var(--gold);border-radius:18px;padding:20px 24px;max-width:440px;width:94%;text-align:center;box-shadow:0 0 60px rgba(0,0,0,.8);max-height:90vh;overflow-y:auto;}
.modal h3{font-size:1rem;color:var(--gold);margin-bottom:8px;letter-spacing:2px;}
.modal p{font-size:12px;color:#b0c0b8;margin-bottom:10px;line-height:1.7;}
.modal-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
.mbtn{padding:8px 15px;font-size:12px;font-weight:700;font-family:inherit;border:none;border-radius:50px;cursor:pointer;transition:transform .15s;}
.mbtn:hover{transform:scale(1.04);}
.mbtn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0a00;}
.mbtn.secondary{background:rgba(255,255,255,.1);color:#ccc;border:1px solid rgba(255,255,255,.18);}
.chance-single{background:rgba(255,255,255,.05);border:1px solid rgba(240,180,60,.3);border-radius:14px;padding:14px 18px;margin:8px 0;}
.cs-icon{font-size:38px;margin-bottom:6px;}.cs-name{font-size:14px;color:var(--gold);font-weight:700;margin-bottom:3px;}.cs-desc{font-size:11px;color:#a0c0b0;line-height:1.6;}.cs-val{font-size:13px;font-weight:700;margin-top:5px;}.cs-val.pos{color:#4ec9b0;}.cs-val.neg{color:#f48771;}
.sp-opts{display:flex;flex-direction:column;gap:7px;margin:8px 0;text-align:left;}
.sp-opt{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;cursor:pointer;transition:all .15s;}
.sp-opt:hover{background:rgba(240,180,60,.1);border-color:rgba(240,180,60,.4);}
.sp-left{display:flex;align-items:center;gap:9px;}
.sp-icon{font-size:20px;}.sp-name{font-size:12px;color:#d0d8e8;font-weight:700;}.sp-desc{font-size:10px;color:#8090a0;margin-top:2px;}.sp-cost{font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap;}
.up-opts{display:flex;flex-direction:column;gap:6px;margin:8px 0;text-align:left;}
.up-opt{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 11px;cursor:pointer;transition:all .15s;}
.up-opt:hover:not(.dis){background:rgba(240,180,60,.12);border-color:rgba(240,180,60,.4);}
.up-opt.dis{opacity:.4;cursor:not-allowed;}
#gameover-screen{display:none;flex-direction:column;align-items:center;gap:18px;padding:20px;}
.go-card{background:rgba(240,180,60,.07);border:2px solid var(--gold);border-radius:20px;padding:28px 44px;text-align:center;box-shadow:0 0 50px rgba(240,180,60,.2);}
.go-icon{font-size:56px;margin-bottom:10px;}
.go-card h2{font-size:1.3rem;color:var(--gold);margin-bottom:10px;letter-spacing:4px;}
.go-card p{font-size:12px;color:#b0c0b8;line-height:1.7;}
.final-scores{margin:12px 0;display:flex;flex-direction:column;gap:5px;}
.fr{display:flex;align-items:center;gap:9px;padding:6px 12px;background:rgba(255,255,255,.05);border-radius:8px;}
.fr-rank{font-size:15px;width:22px;}.fr-name{font-size:12px;flex:1;text-align:left;}.fr-money{font-size:12px;color:var(--gold);font-weight:700;}
.restart-btn{padding:10px 32px;font-size:13px;font-weight:700;font-family:inherit;color:#1a0a00;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:50px;cursor:pointer;transition:transform .15s;margin-top:12px;}
.restart-btn:hover{transform:scale(1.04);}
.err-msg{font-size:11px;color:#ff6b6b;text-align:center;min-height:16px;}
#net-status{position:fixed;bottom:12px;right:14px;font-size:10px;padding:4px 10px;border-radius:10px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);color:#607080;z-index:300;}
#net-status.online{color:#2ecc71;border-color:rgba(46,204,113,.3);}
#net-status.offline{color:#ff6b6b;border-color:rgba(255,100,100,.3);}
</style>
</head>
<body>

<div id="topbar">
  <h1>🐉 中 国 之 旅</h1>
  <div class="info-pill">第 <span id="round-num">—</span> 轮</div>
  <div class="info-pill">当前 <span id="turn-name">—</span></div>
  <div class="info-pill alert" id="bonus-pill" style="display:none;">🎲 <span>再掷一次！</span></div>
</div>
<div id="net-status">● 连接中</div>

<!-- 主菜单 -->
<div id="s-menu" class="screen" style="display:flex">
  <div><div class="s-title">🀄 中国之旅</div><div class="s-sub">豪华版 · 24城棋盘 · 生肖棋子</div></div>
  <div class="divider"></div>
  <button class="big-btn gold" id="btn-solo">🤖 单机模式 &nbsp;（人类 + AI）</button>
  <button class="big-btn ghost" id="btn-online">🌐 联机模式 &nbsp;（Firebase 实时）</button>
</div>

<!-- 单机设置 -->
<div id="s-solo" class="screen">
  <div class="s-title">🤖 单机模式设置</div>
  <div class="divider"></div>
  <div class="opt-row"><span class="opt-label">总玩家数</span>
    <div class="pnum-btns" id="solo-pnum">
      <button class="pnum-btn" data-n="2">2</button>
      <button class="pnum-btn sel" data-n="3">3</button>
      <button class="pnum-btn" data-n="4">4</button>
    </div>
  </div>
  <div class="opt-row"><span class="opt-label">人类玩家</span>
    <div class="tog-grp" id="solo-human"></div>
  </div>
  <div class="opt-row"><span class="opt-label">AI难度</span>
    <div class="tog-grp" id="solo-diff">
      <button class="tog" data-v="easy">随机</button>
      <button class="tog on" data-v="smart">聪明</button>
    </div>
  </div>
  <!-- 路过建房选项已移除 -->
  <div class="opt-row"><span class="opt-label">起始资金</span>
    <div class="tog-grp" id="solo-money">
      <button class="tog" data-v="10000">$10000</button>
      <button class="tog on" data-v="15000">$15000</button>
      <button class="tog" data-v="20000">$20000</button>
    </div>
  </div>
  <div style="display:flex;gap:10px;width:100%;">
    <button class="big-btn ghost" id="solo-back" style="flex:1">← 返回</button>
    <button class="big-btn gold" id="solo-next" style="flex:2">选择生肖 →</button>
  </div>
</div>

<!-- 联机菜单 -->
<div id="s-online" class="screen">
  <div><div class="s-title">🌐 联机模式</div><div class="s-sub">需要网络连接，基于 Firebase</div></div>
  <div class="divider"></div>
  <button class="big-btn gold" id="btn-create">＋ 创建房间</button>
  <button class="big-btn ghost" id="btn-join">→ 加入房间</button>
  <button class="big-btn ghost" id="online-back" style="font-size:12px">← 返回主菜单</button>
</div>

<!-- 创建房间 -->
<div id="s-create" class="screen">
  <div class="s-title">创建房间</div>
  <div class="divider"></div>
  <div class="opt-row"><span class="opt-label">房间人数</span>
    <div class="pnum-btns" id="room-pnum">
      <button class="pnum-btn sel" data-n="2">2</button>
      <button class="pnum-btn" data-n="3">3</button>
      <button class="pnum-btn" data-n="4">4</button>
    </div>
  </div>
  <!-- 路过建房选项已移除 -->
  <div class="opt-row"><span class="opt-label">起始资金</span>
    <div class="tog-grp" id="room-money">
      <button class="tog" data-v="10000">$10000</button>
      <button class="tog on" data-v="15000">$15000</button>
      <button class="tog" data-v="20000">$20000</button>
    </div>
  </div>
  <div class="err-msg" id="create-err"></div>
  <div style="display:flex;gap:10px;width:100%;">
    <button class="big-btn ghost" id="create-back" style="flex:1">← 返回</button>

    document.getElementById(gid).querySelectorAll('.tog').forEach(function(b){b.classList.remove('on');});

    b.className='tog'+(i===soloSet.humans?' on':'');

}

}

async function doJoinRoom(code){
  var errEl=document.getElementById('join-err');
  try{
    var snap=await window.FB.getDoc(window.FB.doc('chinatour',code));
    if(!snap.exists()){errEl.textContent='房间不存在';return;}
    var data=snap.data();
    if(data.status!=='waiting'){errEl.textContent='房间已开始';return;}
    var joined=(data.players||[]).length;
    if(joined>=data.totalPlayers){errEl.textContent='房间已满';return;}
    roomId=code;isHost=false;gameMode='online';myPid=joined;
    zodiacMap={};zodiacQ=[myPid];
    (data.players||[]).forEach(function(p){zodiacMap[p.pid]=p.zodiacIdx;});
    startZodiacFlow(function(){enterWaitRoom(code);});
  }catch(e){errEl.textContent='加入失败: '+e.message;}
}

      });

  }catch(e){console.warn('enterWaitRoom write:',e);}

/* ═══ 构建初始状态 ═══ */
function buildState(onlinePlayers,roomData){
  var n=roomData?roomData.totalPlayers:soloSet.n;
  var sm=roomData?roomData.startMoney:soloSet.money;
  var pb=false; /* 路过建房已禁用，只能落地才能建 */
  var players=[];
  for(var i=0;i<n;i++){
    var zi,name,isAI=false;
    if(gameMode==='online'){
      var op=(onlinePlayers||[]).find(function(x){return x.pid===i;});
      zi=op?op.zodiacIdx:i%ZODIACS.length;name=op?op.name:'玩家'+(i+1);
    }else{
      zi=zodiacMap[i]!==undefined?zodiacMap[i]:i%ZODIACS.length;
      name='玩家'+(i+1);isAI=(i>=soloSet.humans);
    }
    players.push({id:i,name:name,money:sm,pos:0,active:true,jailTurns:0,
      zodiacIdx:zi,color:PC[i].color,glow:PC[i].glow,isAI:isAI});
  }
  var props=CELLS.map(function(_,j){return{idx:j,owner:null,buildings:0};});
  return{players:players,props:props,currentIdx:0,phase:'rolling',round:1,bonusRoll:false,passBuild:pb};
}

function loadOnline(roomData){

function subscribeRoom(){
  if(unsubRoom){unsubRoom();unsubRoom=null;}
  unsubRoom=window.FB.onSnapshot(window.FB.doc('chinatour',roomId),function(snap){
    if(!snap.exists())return;
    var data=snap.data();
    if(data.status==='finished'){showGameOver(data.gameState);return;}
    if(!data.gameState)return;
    G=JSON.parse(JSON.stringify(data.gameState));
    updateAllUI();setRollReady();updateWaitBanner();
  });
}
async function pushState(){
  if(gameMode!=='online')return;
  var alive=G.players.filter(function(p){return p.active;});
  try{
    await window.FB.updateDoc(window.FB.doc('chinatour',roomId),{
      gameState:JSON.parse(JSON.stringify(G)),
      ...(alive.length<=1?{status:'finished'}:{})
    });
  }catch(e){console.warn('pushState:',e);}
}

function reposTokens(){
  var byPos={};
  G.players.forEach(function(p){if(!p.active)return;if(!byPos[p.pos])byPos[p.pos]=[];byPos[p.pos].push(p.id);});
  G.players.forEach(function(p){
    var t=tokenEls[p.id];if(!t)return;
    if(!p.active){t.style.display='none';return;}
    t.style.display='flex';
    var cell=cellEls[p.pos];if(!cell)return;
    var grp=byPos[p.pos],gi=grp.indexOf(p.id),span=(grp.length-1)*18,ox=-span/2+gi*18;
    t.style.left=(cell.offsetLeft+cell.offsetWidth/2-13+ox)+'px';

  });

/* ═══ 移动 ═══ */
function animMove(p,steps,done){
  var moved=0,passedStart=false;
  function step(){
    if(moved>=steps){
      if(passedStart&&p.pos!==0){p.money+=2000;logEvt('🏮 '+p.name+' 经过出发，领取 $2000！（$'+fmt(p.money)+'）');updateRightPanel();}
      done();return;
    }
    moved++;p.pos=(p.pos+1)%TOTAL;
    if(p.pos===0&&moved<steps)passedStart=true;
    reposTokens();hlCells();
    // 路过建房已移除：必须精确落在格子才能升级
    setTimeout(step,270);
  }
  step();
}

/* ═══ 格子事件 ═══ */
function handleCell(p,ibr){
  var cell=CELLS[p.pos],prop=G.props[p.pos];
  document.getElementById('pos-val').textContent=cell.name;
  if(cell.type==='start'){p.money+=3000;logEvt('🏮 '+p.name+' 停在出发格，领取 $3000！（$'+fmt(p.money)+'）');updateRightPanel();finish(ibr);return;}
  if(cell.type==='city'){doCity(p,prop,cell,ibr);return;}
  if(cell.type==='chance'){doChance(p,ibr);return;}
  if(cell.type==='tax'){doTax(p,ibr);return;}
  if(cell.type==='jail'){doJail(p,ibr);return;}
  if(cell.type==='airport'){doAirport(p,ibr);return;}
  if(cell.type==='free'){logEvt('⛺ '+p.name+' 在休息站，平安无事。');finish(ibr);return;}
  finish(ibr);
}

function doJail(p,ibr){
  if(p.isAI){
    if(p.money>=500&&soloSet.diff==='smart'){p.money-=500;logEvt('🚔 '+p.name+'(AI) 缴保释金 $500，继续前行！');}
    else{p.jailTurns=1;logEvt('🚔 '+p.name+'(AI) 选择暂停一回合。');}
    updateRightPanel();finish(ibr);return;
  }
  showModal('🚔 监狱','您触犯了法规，请选择处理方式：',
    [{label:'暂停一回合（免费）',cls:'secondary',cb:function(){p.jailTurns=1;logEvt('🚔 '+p.name+' 选择暂停一回合。');updateRightPanel();finish(ibr);}},
     {label:'缴保释金 $500',cls:'primary',cb:function(){
       if(p.money>=500){p.money-=500;logEvt('🚔 '+p.name+' 缴保释金 $500！（$'+fmt(p.money)+'）');}
       else{p.jailTurns=1;logEvt('🚔 '+p.name+' 余额不足，暂停一回合。');}
       updateRightPanel();finish(ibr);}}]);
}

  document.getElementById('fl2').onclick=function(){
    if(p.money<1500){logEvt('✈ '+p.name+' 余额不足。');hideModal();finish(ibr);return;}
    hideModal();p.money-=1500;p.money+=2000;p.pos=0;reposTokens();hlCells();
    logEvt('✈ '+p.name+' 乘头等舱飞回出发！净收 $500（$'+fmt(p.money)+'）');
    updateRightPanel();finish(ibr);
  };
  document.getElementById('fl3').onclick=function(){hideModal();logEvt(p.name+' 在机场路过。');finish(ibr);};
  document.getElementById('overlay').classList.add('show');
}

function doCity(p,prop,cell,ibr){
  if(prop.owner===null){
    if(p.isAI){aiBuy(p,prop,cell);finish(ibr);return;}
    var cb=p.money>=cell.price;
    showModal('🏙 '+cell.name,cell.desc+'\n\n售价：$'+fmt(cell.price)+
      '\n空地租：$'+fmt(cell.rent[0])+'  1套🏠：$'+fmt(cell.rent[1])+'（建$'+fmt(cell.hc)+'）'+
      '\n2套🏠：$'+fmt(cell.rent[2])+'  3套🏠：$'+fmt(cell.rent[3])+'\n\n余额：$'+fmt(p.money),
      cb?[{label:'购买 $'+fmt(cell.price),cls:'primary',cb:function(){prop.owner=p.id;p.money-=cell.price;
            logEvt('🏙 '+p.name+' 购入【'+cell.name+'】！（$'+fmt(p.money)+'）');
            updateRightPanel();updateCellDisp();finish(ibr);}},
          {label:'暂不购买',cls:'secondary',cb:function(){logEvt(p.name+' 放弃【'+cell.name+'】。');finish(ibr);}}]
        :[{label:'余额不足，继续',cls:'secondary',cb:function(){finish(ibr);}}]);
    return;
  }
  if(prop.owner===p.id){doUpgrade(p,prop,cell,ibr);return;}
  var owner=G.players[prop.owner];var rent=cell.rent[prop.buildings];
  p.money-=rent;owner.money+=rent;
  logEvt('💸 '+p.name+' 在'+owner.name+'的【'+cell.name+'】（'+prop.buildings+'套🏠）缴租 $'+fmt(rent));
  updateRightPanel();checkBankrupt(p);finish(ibr);
}

function doUpgrade(p,prop,cell,ibr){
  if(prop.buildings>=3){logEvt(p.name+' 停在自己的【'+cell.name+'】（已满3套🏠），免租。');finish(ibr);return;}
  if(p.isAI){aiUpgrade(p,prop,cell);finish(ibr);return;}
  var maxAdd=3-prop.buildings;var opts=[];
  for(var add=1;add<=maxAdd;add++) opts.push({add:add,level:prop.buildings+add,cost:cell.hc*add,rent:cell.rent[prop.buildings+add]});
  var exHtml='<div class="up-opts">'+opts.map(function(o){
    var ok=p.money>=o.cost;
    return '<div class="up-opt'+(ok?'':' dis')+'" data-add="'+o.add+'"><span style="font-size:12px;color:#d0d8e8">建至 '+o.level+' 套🏠</span><div style="text-align:right"><div style="font-size:11px;color:var(--gold);font-weight:700">花费 $'+fmt(o.cost)+'</div><div style="font-size:10px;color:#80a090;margin-top:2px">租金→$'+fmt(o.rent)+'</div></div></div>';
  }).join('')+'</div>';
  showModal('🏠 升级 '+cell.name,'当前：'+(prop.buildings===0?'空地':prop.buildings+'套🏠')+'\n余额：$'+fmt(p.money)+'\n选择建设数量：',
    [{label:'暂不升级',cls:'secondary',cb:function(){finish(ibr);}}]);
  document.getElementById('m-extra').innerHTML=exHtml;
  var ibr2=ibr;
  document.getElementById('m-extra').querySelectorAll('.up-opt:not(.dis)').forEach(function(el){
    var add=parseInt(el.dataset.add);var opt=opts.find(function(o){return o.add===add;});
    el.addEventListener('click',function(){
      hideModal();prop.buildings+=opt.add;p.money-=opt.cost;
      logEvt('🏠 '+p.name+' 在【'+cell.name+'】建至'+prop.buildings+'套！租金 $'+fmt(opt.rent));
      updateRightPanel();updateCellDisp();finish(ibr2);
    });
  });
}

function doTax(p,ibr){
  if(p.isAI){var flat=200,pct=Math.max(100,Math.floor(p.money*.1));var c=Math.min(flat,pct);p.money-=c;logEvt('🧾 '+p.name+'(AI) 缴税 $'+fmt(c)+'。（$'+fmt(p.money)+'）');updateRightPanel();checkBankrupt(p);finish(ibr);return;}
  var flat=200,pct=Math.max(100,Math.floor(p.money*.1));
  showModal('🧾 纳税局','选择纳税方式：\n① 固定税 $'+fmt(flat)+'\n② 资产10% = $'+fmt(pct),
    [{label:'固定 $'+fmt(flat),cls:'primary',cb:function(){p.money-=flat;logEvt('🧾 '+p.name+' 缴固定税 $'+fmt(flat)+'。（$'+fmt(p.money)+'）');updateRightPanel();checkBankrupt(p);finish(ibr);}},
     {label:'比例 $'+fmt(pct),cls:'secondary',cb:function(){p.money-=pct;logEvt('🧾 '+p.name+' 缴比例税 $'+fmt(pct)+'。（$'+fmt(p.money)+'）');updateRightPanel();checkBankrupt(p);finish(ibr);}}]);
}

function doChance(p,ibr){
  var card=CHANCE_POOL[Math.floor(Math.random()*CHANCE_POOL.length)];
  if(p.isAI){card.eff(p,G);if(p.money<0)p.money=0;logEvt('🎴 '+p.name+'(AI) 抽到【'+card.name+'】'+card.val+'。（$'+fmt(p.money)+'）');updateRightPanel();checkBankrupt(p);finish(ibr);return;}
  showModal('🎴 机会卡','',
    [{label:'确认',cls:'primary',cb:function(){card.eff(p,G);if(p.money<0)p.money=0;logEvt('🎴 '+p.name+' 抽到【'+card.name+'】'+card.val+'。（$'+fmt(p.money)+'）');updateRightPanel();checkBankrupt(p);finish(ibr);}}]);
  document.getElementById('m-extra').innerHTML='<div class="chance-single"><div class="cs-icon">'+card.icon+'</div><div class="cs-name">'+card.name+'</div><div class="cs-desc">'+card.desc+'</div><div class="cs-val '+(card.type==='pos'?'pos':'neg')+'">'+card.val+'</div></div>';
}

/* ═══ AI决策 ═══ */
function aiBuy(p,prop,cell){
  var thresh=soloSet.diff==='easy'?1.0:1.2;
  if(p.money>=cell.price*thresh&&(soloSet.diff==='easy'?Math.random()<.6:true)){
    prop.owner=p.id;p.money-=cell.price;logEvt('🤖 '+p.name+' 购入【'+cell.name+'】！（$'+fmt(p.money)+'）');
  }else logEvt('🤖 '+p.name+' 放弃【'+cell.name+'】。');
  updateCellDisp();
}
function aiUpgrade(p,prop,cell){
  var thresh=soloSet.diff==='easy'?1.0:1.5;
  if(prop.buildings<3&&p.money>=cell.hc*thresh&&(soloSet.diff==='easy'?Math.random()<.5:true)){
    prop.buildings++;p.money-=cell.hc;logEvt('🤖 '+p.name+' 在【'+cell.name+'】建至'+prop.buildings+'套。');
  }
  updateCellDisp();
}
/* aiPassBuild removed */

/* ═══ 破产 & 结束 ═══ */
function checkBankrupt(p){
  if(p.money<=0&&p.active){
    p.active=false;p.money=0;
    G.props.forEach(function(prop){if(prop.owner===p.id){prop.owner=null;prop.buildings=0;}});
    logEvt('💸 '+p.name+' 破产！');updateRightPanel();updateCellDisp();reposTokens();
  }
}
function finish(ibr){
  updateRightPanel();
  if(ibr&&G.bonusRoll){
    if(gameMode==='online')pushState();
    setTimeout(function(){
      G.phase='rolling';
      var cur=G.players[G.currentIdx];
      var myTurn=gameMode==='solo'?!cur.isAI:cur.id===myPid;
      if(myTurn){
        // 人类玩家：显示再掷按钮
        document.getElementById('bonus-pill').style.display='flex';
        document.getElementById('rollBtn').textContent='🎲 再 掷 一 次！';
        document.getElementById('rollBtn').disabled=false;
        updateWaitBanner();
      } else {
        // AI玩家：自动再掷，不显示按钮
        document.getElementById('bonus-pill').style.display='none';
        document.getElementById('rollBtn').disabled=true;
        logEvt('🤖 '+cur.name+' 获得再掷机会...');
        setTimeout(function(){aiDoTurn(cur);},800);
      }
    },450);return;
  }
  G.bonusRoll=false;if(gameMode==='online')pushState();setTimeout(endTurn,380);
}
function endTurn(){
  var alive=G.players.filter(function(p){return p.active;});
  if(alive.length<=1){showGameOver(G);return;}
  var next=(G.currentIdx+1)%G.players.length;
  while(!G.players[next].active)next=(next+1)%G.players.length;
  if(next<=G.currentIdx)G.round++;
  G.currentIdx=next;G.phase='rolling';G.bonusRoll=false;
  document.getElementById('bonus-pill').style.display='none';
  hlCells();updateRightPanel();updateTopbar();
  if(gameMode==='online')pushState();
  setRollReady();maybeAI();
}
function setRollReady(){
  var cur=G.players[G.currentIdx];
  document.getElementById('rollBtn').textContent='🎲 掷 骰 子';
  document.getElementById('pos-val').textContent=CELLS[cur.pos].name;
  var myTurn=gameMode==='solo'?!cur.isAI:cur.id===myPid;
  document.getElementById('rollBtn').disabled=!(myTurn&&G.phase==='rolling');
  updateWaitBanner();
}
function maybeAI(){
  if(gameMode!=='solo')return;
  var cur=G.players[G.currentIdx];
  if(!cur||!cur.isAI||!cur.active)return;
  setTimeout(function(){aiDoTurn(cur);},900);
}
function aiDoTurn(p){
  if(!p.active||p.id!==G.players[G.currentIdx].id)return;
  G.phase='moving';
  if(p.jailTurns>0){p.jailTurns--;logEvt('⛓ '+p.name+'(AI) 在监狱，跳过本回合。');updateRightPanel();setTimeout(endTurn,600);return;}
  var roll=Math.floor(Math.random()*6)+1;var isSix=(roll===6&&!G.bonusRoll);G.bonusRoll=false;
  logEvt('🤖 '+p.name+' 掷出 '+roll+' 点'+(isSix?' 🎲再掷！':''));
  document.getElementById('dice-val').textContent=DICE_FACES[roll-1]+' '+roll;
  if(isSix)G.bonusRoll=true;
  animMove(p,roll,function(){
    updateRightPanel();document.getElementById('pos-val').textContent=CELLS[p.pos].name;handleCell(p,isSix);
  });
}

/* ═══ Modal ═══ */
function showModal(title,body,buttons){
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-body').innerHTML=body.replace(/\n/g,'<br>');
  document.getElementById('m-extra').innerHTML='';
  document.getElementById('m-btns').innerHTML='';
  buttons.forEach(function(b){
    var btn=document.createElement('button');btn.className='mbtn '+b.cls;btn.textContent=b.label;
    btn.addEventListener('click',function(){hideModal();b.cb();});
    document.getElementById('m-btns').appendChild(btn);
  });
  document.getElementById('overlay').classList.add('show');
}
function hideModal(){document.getElementById('overlay').classList.remove('show');}

/* ═══ 日志 ═══ */
function logEvt(msg){
  var log=document.getElementById('event-log');
  var prev=log.querySelector('.latest');if(prev)prev.classList.remove('latest');
  var line=document.createElement('div');line.className='log-entry latest';line.textContent=msg;
  log.appendChild(line);while(log.children.length>30)log.removeChild(log.firstChild);
  log.scrollTop=log.scrollHeight;
}

/* ═══ 游戏结束 ═══ */
function showGameOver(state){
  document.getElementById('game-screen').style.display='none';
  document.getElementById('gameover-screen').style.display='flex';
  var ranked=state.players.slice().sort(function(a,b){return b.money-a.money;});
  var medals=['🥇','🥈','🥉','4️⃣'];
  document.getElementById('go-scores').innerHTML=ranked.map(function(p,i){
    var z=ZODIACS[p.zodiacIdx]||{emoji:'?'};
    var owned=state.props.filter(function(x){return x.owner===p.id;}).length;
    return '<div class="fr"><span class="fr-rank">'+medals[i]+'</span><span style="font-size:17px">'+z.emoji+'</span>'+
      '<span class="fr-name">'+p.name+(p.isAI?' 🤖':'')+'</span>'+
      '<span class="fr-money">'+(p.active?'$'+fmt(p.money):'破产')+'</span>'+
      '<span style="font-size:10px;color:#506070;margin-left:5px">'+owned+'处地产</span></div>';
  }).join('');
  var winner=ranked.find(function(p){return p.active;})||ranked[0];
  var wz=ZODIACS[winner.zodiacIdx]||{emoji:'🏆'};
  document.getElementById('go-title').textContent=wz.emoji+' '+winner.name+' 荣获地产大亨！';
  document.getElementById('go-desc').textContent='历经 '+state.round+' 轮角逐，'+winner.name+' 胜出！';
}
document.getElementById('restart-btn').addEventListener('click',function(){
  if(unsubRoom){unsubRoom();unsubRoom=null;}
  document.getElementById('gameover-screen').style.display='none';
  showScreen('s-menu');
});

document.getElementById('quit-btn').addEventListener('click',function(){
  showModal('🚪 退出游戏','确定要退出当前游戏吗？进度将不会保存。',
    [{label:'确定退出',cls:'secondary',cb:function(){

        document.getElementById('game-screen').style.display='none';

      }},
     {label:'继续游戏',cls:'primary',cb:function(){}}]);
});

document.getElementById('quit-btn').addEventListener('click',function(){
  // 确认退出弹窗
  showModal('🚪 退出游戏','确定要退出当前游戏？进度将不会保存。',

function fmt(n){return Math.round(n).toLocaleString();}

      var e=document.getElementById(id);if(e)e.style.display='none';

})();
